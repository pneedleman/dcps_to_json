name: Update DCPS School Calendar
 
on:
  schedule:
    # Run daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install requests
 
      - name: Update DCPS calendar JSON
        run: python scripts/update_dcps_calendar.py
 
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dcps_calendar.json
          if git diff --cached --quiet; then
            echo "No calendar changes."
          else
            git commit -m "Update DCPS school calendar [skip ci]"
            git push
          fi
 

